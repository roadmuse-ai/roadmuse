name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Lint
            command: make lint
          - name: Test and Coverage
            command: make test
          - name: Build
            command: make build-spa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spa/package-lock.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: npm ci
        working-directory: spa

      - name: Sync backend dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
