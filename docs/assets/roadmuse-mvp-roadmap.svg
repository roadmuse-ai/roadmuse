<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">RoadMuse MVP roadmap</title>
  <desc id="desc">RoadMuse MVP roadmap generated from repository docs and GitHub issues, showing seven phases from June 2026 through January 2027.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.42" stop-color="#eff8f2"/>
      <stop offset="1" stop-color="#fff8ec"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#24313f"/>
      <stop offset="0.24" stop-color="#25566a"/>
      <stop offset="0.5" stop-color="#1f7a72"/>
      <stop offset="0.74" stop-color="#6f8b34"/>
      <stop offset="1" stop-color="#c0782d"/>
    </linearGradient>
    <linearGradient id="phaseFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6fbf7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#17313d" flood-opacity="0.14"/>
    </filter>
    <pattern id="mapGrid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M0 28 C24 36 44 16 92 22" fill="none" stroke="#d8e8e3" stroke-width="2" opacity="0.55"/>
      <path d="M20 0 C30 36 54 52 46 92" fill="none" stroke="#efd9bb" stroke-width="2" opacity="0.45"/>
      <circle cx="18" cy="70" r="2.5" fill="#adcfc4" opacity="0.55"/>
      <circle cx="66" cy="38" r="2.5" fill="#e4be82" opacity="0.55"/>
    </pattern>
    <style>
      .canvas { fill: url(#sky); }
      .map { fill: url(#mapGrid); opacity: 0.55; }
      .title { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 58px; font-weight: 800; fill: #13212c; }
      .subtitle { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 24px; font-weight: 500; fill: #3f5563; }
      .badgeText { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 22px; font-weight: 800; fill: #13212c; }
      .badgeSub { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 15px; font-weight: 700; fill: #566b75; }
      .phaseTitle { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 23px; font-weight: 800; fill: #13212c; }
      .phaseMeta { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 15px; font-weight: 800; fill: #47606c; }
      .body { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 15px; font-weight: 600; fill: #263944; }
      .small { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 13px; font-weight: 700; fill: #5b6f77; }
      .number { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 22px; font-weight: 900; fill: #ffffff; }
      .gateTitle { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 17px; font-weight: 900; fill: #13212c; }
      .gateBody { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 14px; font-weight: 650; fill: #3e525c; }
      .footer { font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif; font-size: 14px; font-weight: 700; fill: #4b606b; }
    </style>
  </defs>

  <rect class="canvas" width="1600" height="1050"/>
  <rect class="map" width="1600" height="1050"/>

  <path d="M0,804 C130,760 270,784 392,746 C575,690 702,714 856,672 C1044,620 1168,672 1332,620 C1452,582 1532,582 1600,552 L1600,1050 L0,1050 Z" fill="#e6f2e9" opacity="0.78"/>
  <path d="M0,898 C178,828 342,860 500,812 C693,754 850,790 1030,724 C1212,657 1395,683 1600,618 L1600,1050 L0,1050 Z" fill="#f2dfbd" opacity="0.5"/>

  <g transform="translate(76 64)">
    <text class="title" x="0" y="0" dominant-baseline="hanging">RoadMuse MVP Roadmap</text>
    <text class="subtitle" x="2" y="76">Docs + GitHub issues reconciled into a web-first route intelligence plan</text>
  </g>

  <g transform="translate(1040 58)" filter="url(#softShadow)">
    <rect x="0" y="0" width="418" height="98" rx="18" fill="#ffffff" opacity="0.96"/>
    <line x1="142" y1="18" x2="142" y2="80" stroke="#d9e6e2" stroke-width="2"/>
    <line x1="276" y1="18" x2="276" y2="80" stroke="#d9e6e2" stroke-width="2"/>
    <text class="badgeText" x="42" y="39" text-anchor="middle">190h</text>
    <text class="badgeSub" x="42" y="67" text-anchor="middle">MVP effort</text>
    <text class="badgeText" x="209" y="39" text-anchor="middle">32w</text>
    <text class="badgeSub" x="209" y="67" text-anchor="middle">at 6h/week</text>
    <text class="badgeText" x="348" y="39" text-anchor="middle">41</text>
    <text class="badgeSub" x="348" y="67" text-anchor="middle">open GH issues</text>
  </g>

  <g transform="translate(94 196)">
    <path d="M0,148 C160,55 328,96 486,126 C665,160 786,52 952,70 C1110,87 1234,154 1412,72" fill="none" stroke="#233342" stroke-width="58" stroke-linecap="round"/>
    <path d="M0,148 C160,55 328,96 486,126 C665,160 786,52 952,70 C1110,87 1234,154 1412,72" fill="none" stroke="url(#road)" stroke-width="44" stroke-linecap="round"/>
    <path d="M26,142 C174,72 320,103 476,131 C660,164 788,64 948,78 C1104,91 1234,149 1386,84" fill="none" stroke="#f6e9aa" stroke-width="6" stroke-dasharray="34 34" stroke-linecap="round"/>

    <g transform="translate(18 107)">
      <circle cx="0" cy="0" r="28" fill="#0e7187" stroke="#ffffff" stroke-width="7"/>
      <text class="number" x="0" y="1" dominant-baseline="middle" text-anchor="middle">1</text>
    </g>
    <g transform="translate(232 72)">
      <circle cx="0" cy="0" r="28" fill="#306d55" stroke="#ffffff" stroke-width="7"/>
      <text class="number" x="0" y="1" dominant-baseline="middle" text-anchor="middle">2</text>
    </g>
    <g transform="translate(453 104)">
      <circle cx="0" cy="0" r="28" fill="#b67a22" stroke="#ffffff" stroke-width="7"/>
      <text class="number" x="0" y="1" dominant-baseline="middle" text-anchor="middle">3</text>
    </g>
    <g transform="translate(682 73)">
      <circle cx="0" cy="0" r="28" fill="#0d7d70" stroke="#ffffff" stroke-width="7"/>
      <text class="number" x="0" y="1" dominant-baseline="middle" text-anchor="middle">4</text>
    </g>
    <g transform="translate(910 62)">
      <circle cx="0" cy="0" r="28" fill="#5d7d28" stroke="#ffffff" stroke-width="7"/>
      <text class="number" x="0" y="1" dominant-baseline="middle" text-anchor="middle">5</text>
    </g>
    <g transform="translate(1138 119)">
      <circle cx="0" cy="0" r="28" fill="#9f6131" stroke="#ffffff" stroke-width="7"/>
      <text class="number" x="0" y="1" dominant-baseline="middle" text-anchor="middle">6</text>
    </g>
    <g transform="translate(1370 76)">
      <circle cx="0" cy="0" r="28" fill="#24556b" stroke="#ffffff" stroke-width="7"/>
      <text class="number" x="0" y="1" dominant-baseline="middle" text-anchor="middle">7</text>
    </g>
  </g>

  <g transform="translate(64 360)" filter="url(#softShadow)">
    <rect x="0" y="0" width="198" height="286" rx="18" fill="url(#phaseFill)" stroke="#cdded8"/>
    <rect x="0" y="0" width="198" height="12" rx="6" fill="#0e7187"/>
    <text class="phaseTitle" x="22" y="44">1. PWA Shell</text>
    <text class="phaseMeta" x="22" y="72">Weeks 1-6 - 31h</text>
    <text class="small" x="22" y="98">Issues #1-#8</text>
    <text class="body" x="22" y="132">PWA frontend shell</text>
    <text class="body" x="22" y="158">Manifest + service</text>
    <text class="body" x="22" y="184">worker installability</text>
    <text class="body" x="22" y="210">Local settings, saved</text>
    <text class="body" x="22" y="236">places, preferences</text>
    <text class="small" x="22" y="266">Gate: clickable PWA shell</text>
  </g>

  <g transform="translate(282 360)" filter="url(#softShadow)">
    <rect x="0" y="0" width="198" height="286" rx="18" fill="url(#phaseFill)" stroke="#cdded8"/>
    <rect x="0" y="0" width="198" height="12" rx="6" fill="#306d55"/>
    <text class="phaseTitle" x="22" y="44">2. AI Backend</text>
    <text class="phaseMeta" x="22" y="72">Weeks 6-10 - 27h</text>
    <text class="small" x="22" y="98">Issues #9-#13</text>
    <text class="body" x="22" y="132">FastAPI skeleton</text>
    <text class="body" x="22" y="158">Route intent schemas</text>
    <text class="body" x="22" y="184">RouteIntentAgent</text>
    <text class="body" x="22" y="210">PreferenceValidation</text>
    <text class="body" x="22" y="236">structured outputs</text>
    <text class="small" x="22" y="266">Gate: typed AI parsing</text>
  </g>

  <g transform="translate(500 360)" filter="url(#softShadow)">
    <rect x="0" y="0" width="198" height="286" rx="18" fill="url(#phaseFill)" stroke="#cdded8"/>
    <rect x="0" y="0" width="198" height="12" rx="6" fill="#b67a22"/>
    <text class="phaseTitle" x="22" y="44">3. Valhalla</text>
    <text class="phaseMeta" x="22" y="72">Weeks 10-16 - 35h</text>
    <text class="small" x="22" y="98">Issues #14-#18</text>
    <text class="body" x="22" y="132">Location resolver</text>
    <text class="body" x="22" y="158">Valhalla client</text>
    <text class="body" x="22" y="184">Request compiler</text>
    <text class="body" x="22" y="210">Candidate generation</text>
    <text class="body" x="22" y="236">and route scoring</text>
    <text class="small" x="22" y="266">Gate: computed routes</text>
  </g>

  <g transform="translate(718 360)" filter="url(#softShadow)">
    <rect x="0" y="0" width="198" height="286" rx="18" fill="url(#phaseFill)" stroke="#cdded8"/>
    <rect x="0" y="0" width="198" height="12" rx="6" fill="#0d7d70"/>
    <text class="phaseTitle" x="22" y="44">4. Handoff</text>
    <text class="phaseMeta" x="22" y="72">Weeks 16-20 - 24h</text>
    <text class="small" x="22" y="98">Issues #19-#25, #38</text>
    <text class="body" x="22" y="132">Google, Waze, Apple</text>
    <text class="body" x="22" y="158">HERE, Organic Maps</text>
    <text class="body" x="22" y="184">GPX export</text>
    <text class="body" x="22" y="210">Provider warnings</text>
    <text class="body" x="22" y="236">Recommendation engine</text>
    <text class="small" x="22" y="266">Gate: navigator links</text>
  </g>

  <g transform="translate(936 360)" filter="url(#softShadow)">
    <rect x="0" y="0" width="198" height="286" rx="18" fill="url(#phaseFill)" stroke="#cdded8"/>
    <rect x="0" y="0" width="198" height="12" rx="6" fill="#5d7d28"/>
    <text class="phaseTitle" x="22" y="44">5. Route UX</text>
    <text class="phaseMeta" x="22" y="72">Weeks 20-24 - 27h</text>
    <text class="small" x="22" y="98">Issues #26-#30, #39-#40</text>
    <text class="body" x="22" y="132">Speech + text input</text>
    <text class="body" x="22" y="158">Route result UI</text>
    <text class="body" x="22" y="184">Prompt catalog</text>
    <text class="body" x="22" y="210">Explanation card</text>
    <text class="body" x="22" y="236">Parity help examples</text>
    <text class="small" x="22" y="266">Gate: end-to-end demo</text>
  </g>

  <g transform="translate(1154 360)" filter="url(#softShadow)">
    <rect x="0" y="0" width="198" height="286" rx="18" fill="url(#phaseFill)" stroke="#cdded8"/>
    <rect x="0" y="0" width="198" height="12" rx="6" fill="#9f6131"/>
    <text class="phaseTitle" x="22" y="44">6. Route Intel</text>
    <text class="phaseMeta" x="22" y="72">Weeks 25-29 - 30h</text>
    <text class="small" x="22" y="98">Issues #35-#37, #41</text>
    <text class="body" x="22" y="132">Waze search mode</text>
    <text class="body" x="22" y="158">Contextual rules</text>
    <text class="body" x="22" y="184">Applicability scoring</text>
    <text class="body" x="22" y="210">Along-route semantic</text>
    <text class="body" x="22" y="236">POI search</text>
    <text class="small" x="22" y="266">Gate: differentiated AI</text>
  </g>

  <g transform="translate(1372 360)" filter="url(#softShadow)">
    <rect x="0" y="0" width="164" height="286" rx="18" fill="url(#phaseFill)" stroke="#cdded8"/>
    <rect x="0" y="0" width="164" height="12" rx="6" fill="#24556b"/>
    <text class="phaseTitle" x="22" y="44">7. Beta</text>
    <text class="phaseMeta" x="22" y="72">Weeks 30-32</text>
    <text class="phaseMeta" x="22" y="96">16h</text>
    <text class="small" x="22" y="122">Issues #31-#34</text>
    <text class="body" x="22" y="156">Prompt fixtures</text>
    <text class="body" x="22" y="182">URL tests</text>
    <text class="body" x="22" y="208">Deployment docs</text>
    <text class="body" x="22" y="234">CI + demo polish</text>
    <text class="small" x="22" y="266">Gate: MVP beta</text>
  </g>

  <g transform="translate(76 704)" filter="url(#softShadow)">
    <rect x="0" y="0" width="680" height="168" rx="22" fill="#ffffff" opacity="0.96" stroke="#d2e1db"/>
    <text class="gateTitle" x="34" y="42">Installable PWA reconciliation</text>
    <text class="gateBody" x="34" y="76">The previous installable-PWA roadmap maps into this plan, not beside it:</text>
    <text class="gateBody" x="54" y="106">Phase 1 owns manifest, service worker, local-first shell, Android install path, and iPhone Safari Add to Home Screen guidance.</text>
    <text class="gateBody" x="54" y="134">Native-like polish, analytics, testing, release monitoring, and deployment hardening land in Phases 5-7.</text>
  </g>

  <g transform="translate(796 704)" filter="url(#softShadow)">
    <rect x="0" y="0" width="728" height="168" rx="22" fill="#ffffff" opacity="0.96" stroke="#d2e1db"/>
    <text class="gateTitle" x="34" y="42">MVP boundary from docs</text>
    <text class="gateBody" x="34" y="76">Web-first PWA only, no native mobile app, no accounts, local browser settings for MVP.</text>
    <text class="gateBody" x="34" y="108">Core differentiator: natural-language route intent plus Valhalla-shaped routes and honest navigator handoff limits.</text>
    <text class="gateBody" x="34" y="140">Risk buffer: 20 percent contingency extends 190h to 228h, around 38 weeks if needed.</text>
  </g>

  <g transform="translate(88 922)">
    <rect x="0" y="0" width="1424" height="72" rx="18" fill="#13212c" opacity="0.92"/>
    <text class="footer" x="30" y="29" fill="#d9efe9">Sources: docs/roadmap-and-estimates.md, docs/ticket-estimates.md, docs/implementation-plan.md, docs/requirements.md, and live GitHub issues in roadmuse-ai/roadmuse.</text>
    <text class="footer" x="30" y="54" fill="#f0d79e">Forecast window: Jun 20, 2026 to Jan 29, 2027 - 9 epics, 32 stories, all 41 issues currently open when generated.</text>
  </g>
</svg>
